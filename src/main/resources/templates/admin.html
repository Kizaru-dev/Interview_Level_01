<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Dashboard</title>
    <style>
        body {
            font-family: Arial;
            background: #f2f2f2;
            padding: 50px;
        }
        .box {
            background: white;
            margin: auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
        }
        th {
            background: #333;
            color: white;
        }
        a, button {
            text-decoration: none;
            padding: 5px 10px;
            border-radius: 4px;
            color: white;
            border: none;
            cursor: pointer;
        }
        .btn-update { background: blue; }
        .btn-delete { background: red; }
        .form-inline { display: inline-block; }
        .logout { float: right; background: gray; margin-bottom: 20px; }
        .success { color: green; font-weight: bold; }
    </style>
</head>
<body>
<div class="box">
    <a th:href="@{/login}" class="logout">Logout</a>
    <h2>Admin Dashboard</h2>
    <p>Manage User Feedback</p>

    <p class="success" th:if="${param.success != null and param.success[0] == 'updated'}">Feedback updated successfully!</p>
    <p class="success" th:if="${param.success != null and param.success[0] == 'deleted'}">Feedback deleted successfully!</p>

    <table>
        <thead>
        <tr>
            <th>Username</th>
            <th>Email</th>
            <th>Current Feedback</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="u : ${users}" th:if="${u.username != 'admin'}">
            <td th:text="${u.username}"></td>
            <td th:text="${u.gmail}"></td>
            <td>
                <!-- Read Feedback -->
                <span th:if="${u.feedback == null}"><i>No feedback provided</i></span>
                <span th:if="${u.feedback != null}" th:text="${u.feedback}"></span>
            </td>
            <td>
                <!-- Update Feedback Form -->
                <form class="form-inline" th:action="@{/admin/updateFeedback}" method="post">
                    <input type="hidden" name="username" th:value="${u.username}"/>
                    <input type="text" name="feedback" th:value="${u.feedback}" placeholder="New feedback..." required/>
                    <button type="submit" class="btn-update">Update</button>
                </form>

                <!-- Delete Feedback Form -->
                <form class="form-inline" th:action="@{/admin/deleteFeedback}" method="post" th:if="${u.feedback != null}">
                    <input type="hidden" name="username" th:value="${u.username}"/>
                    <button type="submit" class="btn-delete" onclick="return confirm('Are you sure you want to delete this feedback?')">Delete</button>
                </form>
            </td>
        </tr>
        <tr th:if="${users.size() <= 1}">
            <td colspan="4" style="text-align: center;">No users registered yet.</td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
