<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 350px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
        }
        button {
            width: 100%;
            padding: 10px;
            background: blue;
            color: white;
            border: none;
        }
        .error { color: red; }
        .success { color: green; }
    </style>
</head>
<body>

<div class="box">
    <h2>Login</h2>

    <p class="success" th:if="${message}" th:text="${message}"></p>
    <p class="error" th:if="${error}" th:text="${error}"></p>

    <form th:action="@{/login}" th:object="${user}" method="post">

        <input type="text" th:field="*{username}" placeholder="Username">

        <input type="password" th:field="*{password}" placeholder="Password">

        <button type="submit">Login</button>
    </form>

    <p><a th:href="@{/register}">Create account</a></p>
</div>

</body>
</html>
